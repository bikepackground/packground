<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Detail | bikepackground</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-blue: #d8e8f0; 
            --bg-light: #ffffff;
            --text-dark: #1a1a1a;
            --text-dim: #666666;
            --accent-orange: #e67e22; 
            --font-main: 'Inter', sans-serif;
        }

        body { 
            font-family: var(--font-main); 
            line-height: 1.6; 
            color: var(--text-dark); 
            max-width: 800px; 
            margin: 60px auto; 
            padding: 0 20px; 
            background-color: var(--bg-light);
            text-align: left; /* Alles linksbündig */
        }

        h1 { font-size: 2.2rem; border-bottom: 2px solid var(--primary-blue); padding-bottom: 10px; margin-bottom: 20px; text-align: left; }
        h2 { font-size: 1.5rem; margin-top: 40px; color: var(--text-dark); text-align: left; }
        
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--accent-orange); text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
        
        #route-image { width: 100%; border-radius: 12px; margin-bottom: 30px; display: none; }
        
        /* Gaia Button Style */
        .gaia-button { 
            display: none; 
            background-color: var(--accent-orange); 
            color: white; 
            text-align: center; /* Text im Button bleibt zentriert */
            padding: 20px; 
            border-radius: 12px; 
            text-decoration: none; 
            margin: 50px 0; 
            transition: background-color 0.2s;
        }
        .gaia-button:hover { background-color: #d35400; }
        .gaia-button .main-text { display: block; font-weight: 600; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .gaia-button .sub-text { display: block; font-size: 0.9rem; margin-top: 5px; opacity: 0.9; }

        /* Footer Styles angepasst auf linksbündig */
        .site-footer {
            text-align: left; /* Footer-Text linksbündig */
            border-top: 1px solid #eee;
            padding: 40px 0 60px 0; 
            font-size: 0.85rem;
            color: var(--text-dark);
            background-color: var(--bg-light);
            margin-top: 80px;
        }
        .footer-subtext {
            font-size: 0.75rem;
            color: #aaa;
            margin: 10px 0 0 0; /* Margin auf links angepasst */
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to Explore</a>
    
    <div id="content">
        </div>

    <a href="#" id="gaia-link" class="gaia-button">
        <span class="main-text">Waypoints and track on GaiaGPS</span>
        <span class="sub-text">Find full route description in the notes section</span>
    </a>

    <footer class="site-footer">
        <div>
            &copy; bikepackground &ndash; shared for your next adventure.
        </div>
        <div class="footer-subtext">
            <a href="legal.html" style="color: inherit; text-decoration: underline;">Imprint & Privacy</a>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const routeName = urlParams.get('route');

        if (routeName) {
            fetch(routeName + '.txt')
                .then(response => {
                    if (!response.ok) throw new Error('File not found');
                    return response.text();
                })
                .then(text => {
                    const lines = text.split('\n');
                    const gaiaUrl = lines[0].trim(); 
                    const markdownContent = lines.slice(1).join('\n'); 

                    // 1. Bild anzeigen
                    const img = document.createElement('img');
                    img.src = routeName + '.jpg';
                    img.id = "route-image";
                    img.style.display = "block";
                    img.onerror = function() { this.style.display = 'none'; };
                    document.getElementById('content').before(img);

                    // 2. Markdown in HTML umwandeln
                    document.getElementById('content').innerHTML = marked.parse(markdownContent);

                    // 3. Gaia Button aktivieren
                    if(gaiaUrl.startsWith('http')) {
                        const btn = document.getElementById('gaia-link');
                        btn.href = gaiaUrl;
                        btn.style.display = 'block';
                    }
                })
                .catch(err => {
                    document.getElementById('content').innerHTML = "<h1>Route not found</h1><p>Sorry, the description for this adventure is currently not available.</p>";
                    console.error(err);
                });
        }
    </script>
</body>
</html>
