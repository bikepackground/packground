<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Detail | bikepackground</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; line-height: 1.6; color: #1a1a1a; max-width: 800px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 2.2rem; border-bottom: 2px solid #d8e8f0; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { font-size: 1.5rem; margin-top: 40px; color: #2c3e50; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #e67e22; text-decoration: none; font-weight: 600; }
        
        #route-image { width: 100%; border-radius: 12px; margin-bottom: 30px; display: none; }
        
        .gaia-button { display: none; background-color: #e67e22; color: white; text-align: center; padding: 20px; border-radius: 12px; text-decoration: none; margin: 50px 0; }
        .gaia-button:hover { background-color: #d35400; }
        .gaia-button .main-text { display: block; font-weight: 600; font-size: 1.2rem; text-transform: uppercase; }
        .gaia-button .sub-text { display: block; font-size: 0.9rem; opacity: 0.9; }

        footer { margin-top: 80px; font-size: 0.8rem; color: #999; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to Explore</a>
    
    <div id="content">
        </div>

    <a href="#" id="gaia-link" class="gaia-button">
        <span class="main-text">Waypoints and track on GaiaGPS</span>
        <span class="sub-text">Find full route description in the notes section</span>
    </a>

    <footer>Last updated: March 2026</footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const routeName = urlParams.get('route');

        if (routeName) {
            fetch(routeName + '.txt')
                .then(response => response.text())
                .then(text => {
                    // Falls du die erste Zeile für den Gaia-Link reservieren willst:
                    const lines = text.split('\n');
                    const gaiaUrl = lines[0].trim(); // Erste Zeile ist die URL
                    const markdownContent = lines.slice(1).join('\n'); // Der Rest ist Text

                    // 1. Bild anzeigen (erwartet route-name.jpg)
                    const img = document.createElement('img');
                    img.src = routeName + '.jpg';
                    img.id = "route-image";
                    img.style.display = "block";
                    document.getElementById('content').before(img);

                    // 2. Markdown in HTML umwandeln und einfügen
                    document.getElementById('content').innerHTML = marked.parse(markdownContent);

                    // 3. Gaia Button aktivieren
                    if(gaiaUrl.startsWith('http')) {
                        const btn = document.getElementById('gaia-link');
                        btn.href = gaiaUrl;
                        btn.style.display = 'block';
                    }
                });
        }
    </script>
</body>
</html>
