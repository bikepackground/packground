<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Detail | bikepackground</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-blue: #d8e8f0; 
            --bg-light: #ffffff;
            --text-dark: #1a1a1a;
            --text-dim: #666666;
            --accent-orange: #e67e22; 
            --font-main: 'Inter', sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
        }

        body { 
            font-family: var(--font-main); 
            line-height: 1.6; 
            color: var(--text-dark); 
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
        }

        .main-wrapper {
            flex: 1 0 auto;
            max-width: 800px; 
            margin: 40px auto; 
            padding: 0 20px; 
            width: 100%;
            box-sizing: border-box;
        }

        h1 { font-size: 2.0rem; border-bottom: 2px solid var(--primary-blue); padding-bottom: 10px; margin-bottom: 20px; }
        h2 { font-size: 1.5rem; margin-top: 40px; color: var(--text-dark); }
        
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--accent-orange); text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
        
        /* Orange Links im Text (nicht fett) */
        #route-content a {
            color: var(--accent-orange);
            text-decoration: underline;
            font-weight: 400;
        }
        #route-content a:hover {
            text-decoration: none;
        }

        #route-image { width: 100%; border-radius: 12px; margin-bottom: 15px; display: none; }

        .image-link-container { text-align: center; margin-bottom: 30px; display: none; }
        .sub-link { font-size: 0.85rem; color: var(--text-dim); text-decoration: underline; }

        details {
            background: #f4f4f4;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            border: none;
        }
        #route-content hr { display: none; }

        details summary {
            font-weight: 600;
            outline: none;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        details summary::-webkit-details-marker { display: none; }
        details summary::after {
            content: '❯';
            font-size: 0.8rem;
            transition: transform 0.2s;
        }
        details[open] summary::after { transform: rotate(90deg); }
        details div { margin-top: 15px; }

        .gaia-button-container {
            display: flex;
            flex-direction: column;
            align-items: center; 
            margin: 50px 0 20px 0;
        }
        .gaia-button { 
            display: none; 
            background-color: var(--accent-orange); 
            color: white; 
            padding: 12px 30px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 600;
            text-transform: uppercase;
            width: fit-content; 
        }

        .risk-notice {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        .site-footer {
            flex-shrink: 0;
            text-align: center;
            border-top: 1px solid #eee;
            padding: 40px 0 60px 0; 
            font-size: 0.85rem;
            color: var(--text-dark);
            background-color: var(--bg-light);
            width: 100%;
        }
        .footer-subtext { font-size: 0.75rem; color: #aaa; margin: 5px auto 0 auto; line-height: 1.6; }

        .error-note {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <a href="index.html" class="back-link">&larr; Back to Explore</a>
        
        <div id="route-container">
            <img id="route-image" src="">
            <div id="img-link-area" class="image-link-container">
                <a href="https://findpenguins.com/bikepackground" target="_blank" class="sub-link">For more pictures visit findpenguins.com/bikepackground</a>
            </div>
            
            <div id="route-content">Loading adventure...</div>

            <div id="update-area" class="image-link-container" style="margin-top: 10px; margin-bottom: 20px; text-decoration: none; color: var(--text-dim); font-size: 0.85rem; text-align: left;">
                Please help keep this information up to date! Contact via Instagram <a href="https://www.instagram.com/bikepackground" target="_blank" style="color: var(--accent-orange); font-weight: 400; text-decoration: underline;">@bikepackground</a>
            </div>
        </div>

        <div class="gaia-button-container">
            <a href="#" id="gaia-link" class="gaia-button">Waypoints and track on GaiaGPS</a>
            <p id="risk-text" class="risk-notice">for private use only and at your own risk.</p>
