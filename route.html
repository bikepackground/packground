<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Detail | bikepackground</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-blue: #d8e8f0; 
            --bg-light: #ffffff;
            --text-dark: #1a1a1a;
            --text-dim: #666666;
            --accent-orange: #e67e22; 
            --font-main: 'Inter', sans-serif;
        }

        body { 
            font-family: var(--font-main); 
            line-height: 1.6; 
            color: var(--text-dark); 
            max-width: 800px; 
            margin: 60px auto; 
            padding: 0 20px; 
            background-color: var(--bg-light);
            text-align: left;
        }

        h1 { font-size: 2.2rem; border-bottom: 2px solid var(--primary-blue); padding-bottom: 10px; margin-bottom: 20px; }
        h2 { font-size: 1.5rem; margin-top: 40px; color: var(--text-dark); }
        
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--accent-orange); text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
        
        #route-image { width: 100%; border-radius: 12px; margin-bottom: 15px; display: none; }

        .image-link-container { text-align: center; margin-bottom: 30px; display: none; }
        .sub-link { font-size: 0.85rem; color: var(--text-dim); text-decoration: underline; }

        /* Toggle Styling */
        details {
            background: #f4f4f4;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            border: none;
        }
        details summary {
            font-weight: 600;
            outline: none;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        details summary::-webkit-details-marker { display: none; }
