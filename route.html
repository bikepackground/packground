<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Detail | bikepackground</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-blue: #d8e8f0; 
            --bg-light: #ffffff;
            --text-dark: #1a1a1a;
            --text-dim: #666666;
            --accent-orange: #e67e22; 
            --font-main: 'Inter', sans-serif;
        }

        body { 
            font-family: var(--font-main); 
            line-height: 1.6; 
            color: var(--text-dark); 
            max-width: 800px; 
            margin: 60px auto; 
            padding: 0 20px; 
            background-color: var(--bg-light);
        }

        h1 { font-size: 2.2rem; border-bottom: 2px solid var(--primary-blue); padding-bottom: 10px; margin-bottom: 20px; }
        h2 { font-size: 1.5rem; margin-top: 40px; color: var(--text-dark); }
        
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--accent-orange); text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
        
        #route-image { width: 100%; border-radius: 12px; margin-bottom: 15px; display: none; }

        .image-link-container { text-align: center; margin-bottom: 30px; display: none; }
        .sub-link { font-size: 0.85rem; color: var(--text-dim); text-decoration: underline; }

        /* Toggles */
        details {
            background: #f4f4f4;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            border: none;
        }
        #route-content hr { display: none; } /* Entfernt MD-Linien */

        details summary {
            font-weight: 600;
            outline: none;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        details summary::-webkit-details-marker { display: none; }
        details summary::after {
            content: '❯';
            font-size: 0.8rem;
            transition: transform 0.2s;
        }
        details[open] summary::after { transform: rotate(90deg); }
        details div { margin-top: 15px; }

        /* Button Styling */
        .gaia-button-container {
            display: flex;
            flex-direction: column;
            align-items: center; 
            margin: 50px 0 20px 0;
        }
        .gaia-button { 
            display: none; 
            background-color: var(--accent-orange); 
            color: white; 
            padding: 12px 30px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 600;
            text-transform: uppercase;
            width: fit-content; 
        }

        .risk-notice {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
            margin-top: 10px;
            display: none; /* Nur zeigen wenn Button da */
        }

        /* Error Note Styling */
        .error-note {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 40px;
        }

        .site-footer {
            text-align: center;
            border-top: 1px solid #eee;
            padding: 40px 0 60px 0; 
            font-size: 0.85rem;
            color: var(--text-dark);
            margin-top: 60px;
        }
        .footer-subtext { font-size: 0.75rem; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to Explore</a>
    
    <div id="route-container">
        <img id="route-image" src="">
        <div id="img-link-area" class="image-link-container">
            <a href="https://findpenguins.com/bikepackground" target="_blank" class="sub-link">For more pictures visit findpenguins.com/bikepackground</a>
        </div>
        <div id="route-content">
            </div>
    </div>

    <div class="gaia-button-container">
        <a href="#" id="gaia-link" class="gaia-button">Waypoints and track on GaiaGPS</a>
        <p id="risk-text" class="risk-notice">for private use only and at your own risk.</p>
    </div>

    <footer class="site-footer">
        <div>&copy; bikepackground &ndash; shared for your next adventure.</div>
        <div class="footer-subtext">
            <a href="legal.html" style="color: inherit; text-decoration: underline;">Imprint & Privacy</a>
        </div>
    </footer>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const routeName = urlParams.get('route');

            const contentDiv = document.getElementById('route-content');

            if (!routeName) {
                showError("No route specified.");
                return;
            }

            fetch(routeName + '.txt')
                .then(res => {
                    if (!res.ok) throw new Error("Route file not found.");
                    return res.text();
                })
                .then(text => {
                    const lines = text.split('\n');
                    const gaiaUrl = lines[0].trim(); 
                    const markdownContent = lines.slice(1).join('\n'); 

                    // Bild-Logik
                    const img = document.getElementById('route-image');
                    const imgLink = document.getElementById('img-link-area');
                    img.src = routeName + '.JPG';
                    img.onload = () => { 
                        img.style.display = 'block'; 
                        imgLink.style.display = 'block'; 
                    };

                    // Content rendern
                    contentDiv.innerHTML = marked.parse(markdownContent);

                    // Gaia Button & Risk Notice
                    if(gaiaUrl.startsWith('http')) {
                        document.getElementById('gaia-link').href = gaiaUrl;
                        document.getElementById('gaia-link').style.display = 'inline-block';
                        document.getElementById('risk-text').style.display = 'block';
                    }
                })
                .catch(err => {
                    showError("Sorry, this adventure description is currently not available.");
                    console.error(err);
                });

            function showError(message) {
                contentDiv.innerHTML = `
                    <div class="error-note">
                        <h3>Route not found</h3>
                        <p>${message}</p>
                        <a href="index.html" class="back-link" style="margin-top:10px;">Return to Overview</a>
                    </div>`;
            }
        };
    </script>
</body>
</html>
