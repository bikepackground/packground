<html lang="en">
<head>

    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-blue: #d8e8f0; /* Hellblau aus dem Screenshot */
            --bg-light: #ffffff;
            --text-dark: #1a1a1a;
            --text-dim: #666666;
            --accent-orange: #e67e22; 
            --font-main: 'Inter', sans-serif;
            --font-accent: 'Caveat', cursive;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Container für sauberen Weißraum --- */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* --- 1. Header (Hero) --- */
        .hero {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url('hero-bikepacking.JPG'); 
            background-size: cover;
            background-position: center;
            height: 80vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white; 
        }

        .hero h1 {
            font-family: var(--font-accent);
            font-size: 5rem; /* Etwas größer für die Schreibschrift-Wirkung */
            font-weight: 700;
            margin: 0;
            text-transform: none; /* Schreibschrift wirkt ohne All-Caps besser */
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .hero-text {
            color: white;
            font-family: var(--font-main);
            font-size: 1.1rem;
            margin: 15px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* --- Allgemeine Sektions-Styles --- */
        section {
            padding: 80px 0;
        }

        h2 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 50px;
        }

        /* --- 2. FAMILY SHIFT --- */
        .family-shift {
            display: flex;
            align-items: center;
            gap: 60px;
        }

        .family-content {
            flex: 1;
        }

        .family-content h2 {
            text-align: left; 
            margin-bottom: 20px;
        }

        .family-image-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text-link {
            color: var(--accent-orange);
            text-decoration: none;
            font-weight: 800; 
            border-bottom: 2px solid transparent; 
            transition: all 0.3s ease;
        }

        .text-link:hover {
            color: #a0c4d6; 
            border-bottom: 2px solid #a0c4d6;
        }

        .family-image {
            width: 350px;
            height: 350px;
            border-radius: 50%; 
            background-image: url('family-foto.jpg'); 
            background-size: cover;
            background-position: center;
            border: 8px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 2; 
        }

        .deco-circle {
            position: absolute;
            background-color: var(--primary-blue);
            border-radius: 50%;
            opacity: 1;
            z-index: 1;
        }
        .deco-circle-1 { width: 120px; height: 120px; top: -15px; left: 25px; }
        .deco-circle-2 { width: 180px; height: 180px; bottom: -35px; right: 15px; }

            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-blue {
            background-color: var(--primary-blue);
            color: var(--text-dark);
            padding: 12px 25px;
