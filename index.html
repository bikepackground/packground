<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPLORE THE PACKGROUND | Bikepacking Routes</title>
    
    <meta name="description" content="Handpicked route descriptions for bikepacking adventures. Featuring Mongolia guide, Altay Ukok Plateau, Baikal winter cycling, Morocco High Atlas, Peru Illampu circuit, and Andes Puna.">
    <meta name="keywords" content="Bikepacking Mongolia, Altay Ukok Plateau, Baikal winter cycling, Morocco High Atlas, Peru Illampu circuit, Andes Puna, bikepacking route descriptions">

    <meta property="og:title" content="Expert route descriptions for bikepacking adventures">
    <meta property="og:description" content="Detailed guides for Altay, Baikal, Morocco, Peru and the Andes Puna. Including full route descriptions.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-blue: #d8e8f0; 
            --bg-light: #ffffff;
            --text-dark: #1a1a1a;
            --text-dim: #666666;
            --accent-orange: #e67e22; 
            --font-main: 'Inter', sans-serif;
            /* OPTIMIERUNG: Fallback-Schriften für Caveat gegen Springen (FOUT) */
            --font-accent: 'Caveat', "Apple Chancery", "Segoe Script", cursive;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1100px; 
            margin: 0 auto;
            padding: 0 40px;
        }

        /* --- 1. Header (Hero) --- */
        .hero {
            /* OPTIMIERUNG: Abdunkelung reduziert */
            background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4)), url('hero-bikepacking.JPG'); 
            background-size: cover;
            background-position: center;
            height: 80vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white; 
        }

        .hero h1 {
            font-family: var(--font-accent);
            font-size: 5rem; 
            font-weight: 700;
            margin: 0;
            text-transform: none; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .hero-text {
            color: white;
            font-family: var(--font-main);
            font-size: 1.1rem;
            margin: 15px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        section {
            padding: 80px 0;
        }

        h2 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 50px;
        }

        /* --- 2. FAMILY SHIFT --- */
        .family-shift {
            display: flex;
            align-items: center;
            gap: 60px;
        }

        .family-content {
            flex: 1;
        }

        .family-content h2 {
            text-align: left; 
            margin-bottom: 20px;
        }

        .family-image-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text-link, .text-link:visited {
            color: var(--accent-orange);
            text-decoration: none;
            font-weight: 800; 
            border-bottom: 2px solid transparent; 
            transition: all 0.3s ease;
        }

        .text-link:hover, .text-link:active {
            color: #a0c4d6; 
            border-bottom: 2px solid #a0c4d6;
            text-decoration: none;
        }

        .family-image {
            width: 350px;
            height: 350px;
            border-radius: 50%; 
            background-image: url('family-foto.jpg'); 
            background-size: cover;
            background-position: center;
            border: 8px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 2; 
        }

        .deco-circle {
            position: absolute;
            background-color: var(--primary-blue);
            border-radius: 50%;
            opacity: 1;
            z-index: 1;
        }
        .deco-circle-1 { width: 120px; height: 120px; top: -25px; left: 30px; }
        .deco-circle-2 { width: 180px; height: 180px; bottom: -35px; right: 25px; }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            /* OPTIMIERUNG: Mehr Platz nach unten in regulärer Ansicht */
            margin-bottom: 50px; 
        }

        .btn-blue {
            background-color: var(--primary-blue);
            color: var(--text-dark);
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 800;
            transition: opacity 0.3s ease;
            text-align: center;
            font-size: 0.75rem;
            text-transform: uppercase;
            line-height: 1.4;
        }
        .btn-blue:hover {
            opacity: 0.8;
        }

        /* --- 3. ROUTES LEGACY --- */
        .routes-legacy {
            background-color: #f9f9f9; 
            text-align: center;
        }

        .routes-legacy-intro {
            text-align: center;
            color: var(--text-dark); 
            max-width: 650px;
            margin: 0 auto 60px auto;
            font-size: 1.05rem;
        }

        .signature {
            font-family: var(--font-accent);
            font-size: 1.8rem;
            color: var(--text-dark);
            display: block;
            margin-top: 10px;
        }

        .route-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px;
        }

        .
